<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Astronaut, Run! - Cross Platform</title>
    <style>
        /* 基礎樣式與防止手機縮放 */
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { margin: 0; overflow: hidden; background: #050510; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; }
        
        /* 固定 3:4 比例容器 */
        #gameContainer { 
            position: relative; 
            width: 450px; 
            height: 600px; 
            border: 4px solid #333; 
            border-radius: 15px; 
            box-shadow: 0 0 50px rgba(0,242,255,0.4); 
            overflow: hidden; 
            background: #000;
        }

        /* 手機適應：如果螢幕太小則縮放容器 */
        @media (max-width: 500px), (max-height: 650px) {
            #gameContainer { transform: scale(0.85); }
        }
        @media (max-width: 400px) {
            #gameContainer { transform: scale(0.75); }
        }

        canvas { display: block; width: 100%; height: 100%; }
        
        /* 介面層 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; z-index: 100; box-sizing: border-box; }
        .bg-dark { background: rgba(5, 5, 20, 0.95); }
        .btn-neon { padding: 12px 40px; background: #00f2ff; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 18px; color: #050510; box-shadow: 0 0 20px #00f2ff; margin-top: 20px; transition: 0.2s; }
        .btn-neon:hover { transform: scale(1.05); background: #fff; }
        
        .manual { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 10px; font-size: 13px; text-align: left; line-height: 1.5; border: 1px solid #444; width: 85%; margin-top: 15px; }
        
        /* 商店與暫停 */
        #pauseOverlay { display: none; background: rgba(0,0,0,0.8); z-index: 200; flex-direction: row; }
        #sideShop { width: 160px; height: 100%; background: #0a0a1a; border-left: 2px solid #00f2ff; padding: 20px 10px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        .shop-btn { background: #222; border: 1px solid #444; color: white; width: 100%; padding: 10px 5px; margin-bottom: 12px; cursor: pointer; font-size: 11px; border-radius: 5px; }

        /* UI 元件 */
        #ui { position: absolute; top: 20px; left: 20px; pointer-events: none; color: #00f2ff; z-index: 50; text-align: left; }
        #hud { position: absolute; bottom: 85px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; font-size: 12px; border-left: 4px solid #00f2ff; z-index: 50; }

        /* 手機虛擬按鈕 */
        .mobile-btns {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 150;
        }
        .m-btn {
            width: 55px;
            height: 55px;
            background: rgba(0, 242, 255, 0.2);
            border: 2px solid #00f2ff;
            border-radius: 50%;
            color: #00f2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .m-btn:active { background: #00f2ff; color: #000; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="startScreen" class="overlay bg-dark">
        <h1 style="color:#00f2ff; text-shadow:0 0 20px #00f2ff; font-size: 42px; margin: 0;">Astronaut, Run!</h1>
        <div class="manual">
            <b style="color:#ffcc00">電腦 / 手機操作：</b><br>
            • <b>A/D 或 左右滑</b> : 更換跑道<br>
            • <b>W 或 向上滑</b> : 跳躍 (躲避矮怪)<br>
            • <b>S 或 向下滑</b> : 下滑 (躲避太空人/快速落地)<br>
            • <b>Z 鍵 或 [Z] 按鈕</b> : 暫停與商店<br>
            • <b>Q 鍵 或 [Q] 按鈕</b> : 使用道具
        </div>
        <button class="btn-neon" onclick="toLobby()">進入整備室</button>
    </div>

    <div id="lobbyScreen" class="overlay bg-dark" style="display:none;">
        <h2 style="color:#00f2ff">整備室：選擇裝備</h2>
        <div style="color:#ffcc00; margin-bottom:10px;">金幣餘額: $<span id="lobbyCoins">0</span></div>
        <div id="itemGrid" style="display:flex; gap:8px; margin-bottom:15px;">
            <div style="border:1px solid #444; padding:8px;" onclick="selectItem('shield')">🛡️<br>防護罩</div>
            <div style="border:1px solid #444; padding:8px;" onclick="selectItem('double')">💎<br>炭吉</div>
            <div style="border:1px solid #444; padding:8px;" onclick="selectItem('super')">🔥<br>超級</div>
        </div>
        <button class="btn-neon" onclick="startGame()">出發！</button>
    </div>

    <div id="pauseOverlay" class="overlay">
        <div style="flex:1;">
            <h2 style="color:#00f2ff; font-size: 36px; margin-top:100px;">PAUSED</h2>
            <button class="btn-neon" onclick="togglePause()">繼續遊戲</button>
        </div>
        <div id="sideShop">
            <div style="font-size: 20px;">宇宙商店</div>
            <div style="color:#ffcc00; margin: 10px 0;">💰 $<span id="shopCoins">0</span></div>
            <button class="shop-btn" onclick="buy('shield')">🛡️ 防護罩 $50</button>
            <button class="shop-btn" onclick="buy('double')">💎 炭吉 $100</button>
            <button class="shop-btn" onclick="buy('super')">🔥 超級 $150</button>
        </div>
    </div>

    <div id="ui">
        <div style="color:#ff5555; font-size:12px;">HI: <span id="hiText">0</span></div>
        <div style="font-size:28px; font-weight:bold;">SCORE: <span id="scoreText">0</span></div>
        <div style="color:#ffcc00;">$ <span id="coinText">0</span></div>
    </div>

    <div id="hud">
        <div id="hud-item">裝備：無</div>
        <div id="hud-count">剩餘：0/3</div>
        <div id="hud-timer" style="color:#00f2ff; height:15px;"></div>
    </div>

    <div class="mobile-btns">
        <div class="m-btn" onclick="handleInput('q')">Q</div>
        <div class="m-btn" onclick="handleInput('z')">Z</div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 450; canvas.height = 600;

    // 數據管理
    let gold = parseInt(localStorage.getItem('astro_gold')) || 0;
    let high = parseInt(localStorage.getItem('astro_high')) || 0;
    let inv = JSON.parse(localStorage.getItem('astro_inv')) || { shield: 0, double: 0, super: 0 };
    let score, speed, isPaused, obstacles, frame, playerColor, gameState = 'START';
    let currentItem = 'none', useCount = 0, buff = { type: '', timer: 0 };
    const player = { x: 225, lane: 1, jumping: false, v: 0, y: 0, sliding: 0, gravity: 1.2 };

    // --- 核心輸入處理 (整合鍵盤與觸控) ---
    function handleInput(cmd) {
        if (gameState === 'START' && cmd === 'space') toLobby();
        else if (gameState === 'LOBBY' && cmd === 'space') startGame();
        else if (gameState === 'OVER' && cmd === 'space') toLobby();

        if (cmd === 'z') togglePause();
        if (cmd === 'q' && gameState === 'PLAYING' && !isPaused) useItem();

        if (gameState !== 'PLAYING' || isPaused) return;

        if (cmd === 'left' && player.lane > 0) player.lane--;
        if (cmd === 'right' && player.lane < 2) player.lane++;
        if (cmd === 'up') {
            if (player.sliding > 0) player.sliding = 0;
            if (!player.jumping) { player.v = 18; player.jumping = true; }
        }
        if (cmd === 'down') {
            if (player.jumping) player.v = -20;
            else player.sliding = 20;
        }
    }

    // 鍵盤監聽
    window.addEventListener('keydown', e => {
        const k = e.key.toLowerCase();
        if (e.code === 'Space') handleInput('space');
        if (k === 'w') handleInput('up');
        if (k === 's') handleInput('down');
        if (k === 'a') handleInput('left');
        if (k === 'd') handleInput('right');
        if (k === 'z') handleInput('z');
        if (k === 'q') handleInput('q');
    });

    // 觸控滑動監聽
    let tX = 0, tY = 0;
    canvas.addEventListener('touchstart', e => {
        tX = e.touches[0].clientX;
        tY = e.touches[0].clientY;
    });
    canvas.addEventListener('touchend', e => {
        let dX = e.changedTouches[0].clientX - tX;
        let dY = e.changedTouches[0].clientY - tY;
        if (Math.abs(dX) > Math.abs(dY)) {
            if (dX > 30) handleInput('right');
            else if (dX < -30) handleInput('left');
        } else {
            if (dY > 30) handleInput('down');
            else if (dY < -30) handleInput('up');
        }
    });

    // --- 遊戲邏輯函數 ---
    function togglePause() {
        if(gameState !== 'PLAYING') return;
        isPaused = !isPaused;
        document.getElementById('pauseOverlay').style.display = isPaused ? 'flex' : 'none';
        if(!isPaused) loop();
    }

    function useItem() {
        if(currentItem !== 'none' && useCount < 3 && inv[currentItem] > 0) {
            inv[currentItem]--; useCount++; buff.type = currentItem;
            buff.timer = currentItem === 'shield' ? 300 : (currentItem === 'double' ? 1800 : 1200);
            save(); syncUI(); updateHUD();
        }
    }

    function buy(t) {
        const p = { shield: 50, double: 100, super: 150 };
        if (gold >= p[t]) { gold -= p[t]; inv[t]++; save(); syncUI(); }
    }

    function save() {
        localStorage.setItem('astro_gold', gold);
        localStorage.setItem('astro_high', high);
        localStorage.setItem('astro_inv', JSON.stringify(inv));
    }

    function syncUI() {
        document.getElementById('lobbyCoins').innerText = gold;
        document.getElementById('shopCoins').innerText = gold;
        document.getElementById('coinText').innerText = gold;
        document.getElementById('hiText').innerText = high;
    }

    function toLobby() {
        gameState = 'LOBBY';
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('lobbyScreen').style.display = 'flex';
        syncUI();
    }

    function selectItem(t) { currentItem = t; updateHUD(); }
    
    function updateHUD() {
        document.getElementById('hud-item').innerText = "裝備：" + currentItem;
        document.getElementById('hud-count').innerText = "剩餘：" + (3-useCount) + "/3";
    }

    function startGame() {
        gameState = 'PLAYING';
        document.getElementById('lobbyScreen').style.display = 'none';
        score = 0; speed = 0.016; isPaused = false; obstacles = []; player.lane = 1; frame = 0; useCount = 0; buff = { type: '', timer: 0 };
        playerColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
        updateHUD(); syncUI();
        requestAnimationFrame(loop);
    }

    // --- 繪圖邏輯 (物件相同) ---
    function drawScene() {
        let g = ctx.createLinearGradient(0, 0, 0, 600);
        g.addColorStop(0, '#050510'); g.addColorStop(1, '#000');
        ctx.fillStyle = g; ctx.fillRect(0, 0, 450, 600);
        ctx.strokeStyle = '#00f2ff22';
        [-300, -100, 100, 300].forEach(w => {
            ctx.beginPath(); ctx.moveTo(225 + w/15, 240); ctx.lineTo(225 + w, 600); ctx.stroke();
        });
    }

    function drawPlayer(f) {
        let targetX = [100, 225, 350][player.lane];
        player.x += (targetX - player.x) * 0.3;
        ctx.save(); ctx.translate(player.x, 540 - player.y);
        if (buff.timer > 0 && (buff.type === 'shield' || buff.type === 'super')) {
            ctx.strokeStyle = '#00f2ff'; ctx.beginPath(); ctx.arc(0,-30,40,0,7); ctx.stroke();
        }
        ctx.fillStyle = playerColor;
        if (player.sliding > 0) ctx.fillRect(-25, -15, 50, 15);
        else ctx.fillRect(-15, -50, 30, 50);
        ctx.restore();
    }

    function drawObs(o, f) {
        let z = o.z;
        let screenY = 240 + (z * 360);
        let scale = 0.1 + z * 1.5;
        let laneX = [85, 225, 365][o.lane];
        let screenX = 225 + (laneX - 225) * scale;
        ctx.save(); ctx.translate(screenX, screenY); ctx.scale(scale, scale);
        if(o.type === 'GOBLIN') { ctx.fillStyle='#4a4'; ctx.fillRect(-15,-30,30,30); }
        else if(o.type === 'ASTRONAUT') { ctx.fillStyle='#fff'; ctx.fillRect(-15,-80,30,30); }
        else { ctx.fillStyle='#777'; ctx.beginPath(); ctx.arc(0,-20,20,0,7); ctx.fill(); }
        ctx.restore();
    }

    function loop() {
        if (gameState === 'OVER') {
            ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,450,600);
            ctx.fillStyle = '#ff5555'; ctx.textAlign = 'center'; ctx.font = '30px Arial';
            ctx.fillText('MISSION FAILED', 225, 300);
            return;
        }
        if (isPaused) return;

        ctx.clearRect(0,0,450,600);
        drawScene();
        frame++; speed += 0.00001;
        if(buff.timer > 0) buff.timer--;

        if (player.jumping) {
            player.y += player.v; player.v -= player.gravity;
            if (player.y <= 0) { player.y = 0; player.jumping = false; }
        }
        if (player.sliding > 0) player.sliding--;

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i]; o.z += speed;
            drawObs(o, frame);
            if (o.z > 0.85 && o.z < 0.95 && o.lane === player.lane) {
                let hit = false;
                if (o.type === 'GOBLIN' && player.y < 30) hit = true;
                if (o.type === 'ASTRONAUT' && player.sliding <= 0) hit = true;
                if (o.type === 'ROCK') hit = true;
                if (hit) {
                    if (buff.timer > 0 && (buff.type === 'shield' || buff.type === 'super')) {
                        if (buff.type === 'shield') buff.timer = 0;
                        obstacles.splice(i, 1);
                    } else { gameState = 'OVER'; save(); }
                }
            }
            if (o.z > 1.1) {
                obstacles.splice(i, 1);
                score += (buff.type === 'double' && buff.timer > 0) ? 20 : 10;
                gold += 5; if(score > high) high = score;
                save(); syncUI();
            }
        }

        if (frame % 60 === 0) {
            let r = Math.random();
            obstacles.push({ lane: Math.floor(Math.random() * 3), z: 0, type: r < 0.4 ? 'GOBLIN' : (r < 0.7 ? 'ASTRONAUT' : 'ROCK') });
        }

        document.getElementById('scoreText').innerText = Math.floor(score);
        drawPlayer(frame);
        requestAnimationFrame(loop);
    }
    syncUI();
</script>
</body>
</html>
